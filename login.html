<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">
  <meta name="theme-color" content="#0A1D4A">
  <title>Login — Vision Jeans Dashboard</title>
  <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="login-page" style="grid-template-columns:1fr;display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg-card);">
  <!-- ESQUERDA: formulário -->
  <div class="login-left" style="width:100%;max-width:420px;padding:48px 32px;">
    <div class="login-logo-wrap">
      <img src="img/logo.png" alt="Vision Jeans" class="login-logo">
      <div class="login-logo-sub">Painel Administrativo</div>
    </div>
    <div class="login-box">
      <h1 class="login-title">Bem-vinda de volta</h1>
      <p class="login-subtitle">Acesse o painel para gerenciar pedidos e produtos.</p>
      <div class="login-error" id="loginError">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="loginErrorMsg">E-mail ou senha incorretos.</span>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="vendedora@visionjeans.com" autocomplete="email" required>
        </div>
        <div class="form-group" style="margin-bottom:22px;">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg login-btn-full" id="loginBtn">
          Entrar no Painel
        </button>
      </form>
      <p style="margin-top:24px;font-size:12px;color:var(--text-muted);text-align:center;">
        Uso interno apenas
      </p>
    </div>
  </div>


</div>

<div id="toast-container"></div>
<script type="module" src="js/login.js"></script>
</body>
</html>
